<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Endometriosis y adenomiosis · Diagrama interactivo</title>
<script>
  if (new URLSearchParams(window.location.search).get('integrado') === 'true') {
    document.documentElement.classList.add('integrated');
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4ECE3; --surface:#FCF8F2; --ink:#3B322C; --sub:#8C7E70; --line:#E6DACB;
    --uFill:#EBBDAE; --uStroke:#CE8A7C; --cavity:#F7E6DE; --ovary:#EBBDAE;
    --organ:#E8D2A4; --organS:#C9A86F; --organHi:#F6E8CB;
    --endo:#9E3D5B; --endoEdge:#7E2E47; --adeno:#B0712A;
    --labelInk:#5A4F45; --leader:#C2AE97;
    --display:'Newsreader',Georgia,serif; --body:'Mulish',system-ui,sans-serif;
    --accent:var(--endo);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  /* The embeddable widget: scales to its container, keeps 9:16 */
  .endo-widget{position:relative;width:100%;height:100%;margin:0;overflow:hidden;
    border-radius:28px;background:var(--bg);box-shadow:0 24px 60px rgba(59,50,44,.18);}
  html.integrated .endo-widget{border-radius:0;}
  .endo-stage{position:absolute;top:0;width:1080px;height:1920px;transform-origin:top left;background:var(--bg);
    font-family:var(--body);display:flex;flex-direction:column;padding:86px 70px 70px;}
  .title{text-align:center;margin:0;font-family:var(--display);font-weight:600;font-size:60px;
    line-height:1.04;color:var(--ink);}
  .lede{text-align:center;margin:22px auto 0;max-width:780px;font-size:34px;line-height:1.45;color:var(--sub);text-wrap:pretty;}
  .toggle{display:flex;gap:22px;margin:54px 0 8px;position:relative;z-index:5;}
  .toggle button{flex:1;padding:28px 0;border-radius:20px;font-family:var(--body);font-size:40px;
    letter-spacing:.3px;cursor:pointer;transition:all .3s ease;border:2px solid var(--line);
    background:#fff;color:#6E6358;font-weight:600;}
  .toggle button[aria-pressed="true"]{color:#fff;font-weight:700;}
  #btnEndo[aria-pressed="true"]{background:var(--endo);border-color:var(--endo);box-shadow:0 14px 34px rgba(158,61,91,.25);}
  #btnAdeno[aria-pressed="true"]{background:var(--adeno);border-color:var(--adeno);box-shadow:0 14px 34px rgba(176,113,42,.25);}
  .diagram{position:relative;flex:1;display:flex;align-items:center;justify-content:center;min-height:0;pointer-events:none;}
  .glow{position:absolute;width:600px;height:600px;border-radius:50%;filter:blur(22px);transition:background .5s ease;
    background:radial-gradient(circle,rgba(158,61,91,.20) 0%,rgba(158,61,91,0) 68%);animation:glowPulse 4s ease-in-out infinite;}
  .diagram svg{position:relative;width:100%;height:100%;max-width:720px;overflow:visible;}
  .lesion{transform-box:fill-box;transform-origin:center;animation:dotPulse 2.6s ease-in-out infinite;}
  .breathe{transform-box:fill-box;transform-origin:200px 215px;animation:breathe 6.5s ease-in-out infinite;}
  .lgroup{transform-box:fill-box;transform-origin:200px 210px;transition:opacity .55s ease,transform .55s ease;}
  .uwrap{transform-box:fill-box;transform-origin:center;transition:transform .55s ease;}
  .uwall{transition:stroke-width .55s ease;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:32px;padding:50px 52px;}
  .card.swap{animation:fadeUp .5s ease both;}
  .chip{display:inline-block;padding:12px 24px;border-radius:999px;font-family:var(--body);font-weight:700;
    font-size:30px;letter-spacing:.4px;background:rgba(158,61,91,.12);color:var(--accent);transition:all .4s ease;}
  .card h2{margin:26px 0 0;font-family:var(--display);font-weight:600;font-size:58px;line-height:1.05;color:var(--accent);transition:color .4s ease;}
  .card .def{margin:18px 0 0;font-size:35px;line-height:1.5;color:var(--ink);text-wrap:pretty;}
  .sectlabel{display:flex;align-items:center;gap:14px;margin:30px 0 0;}
  .sectlabel span:first-child{font-size:26px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--sub);}
  .sectlabel .rule{height:1px;flex:1;background:var(--line);}
  .ubic{margin:12px 0 0;font-size:32px;font-weight:700;color:var(--ink);}
  .sint{display:flex;flex-direction:column;gap:16px;margin-top:18px;}
  .sint .row{display:flex;align-items:flex-start;gap:16px;}
  .sint .dot{margin-top:12px;width:12px;height:12px;border-radius:50%;background:var(--accent);flex:none;transition:background .4s ease;}
  .sint .row span:last-child{font-size:32px;line-height:1.4;color:var(--ink);}
  .foot{display:flex;align-items:center;justify-content:space-between;margin-top:30px;}
  .foot .disc{font-size:24px;color:var(--sub);max-width:680px;text-wrap:pretty;}
  .foot .brand{font-size:24px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);white-space:nowrap;transition:color .4s ease;}
  @keyframes dotPulse{0%,100%{transform:scale(1);opacity:.95;}50%{transform:scale(1.28);opacity:.65;}}
  @keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.018);}}
  @keyframes glowPulse{0%,100%{opacity:.45;}50%{opacity:.9;}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  @media (prefers-reduced-motion: reduce){
    .lesion,.breathe,.glow,.card.swap{animation:none!important;}
  }
</style>
</head>
<body>
<div class="endo-widget">
  <div class="endo-stage" id="stage">
    <h1 class="title">Conoce la diferencia</h1>
    <p class="lede">Toca cada condición para ver dónde crece el tejido sobre la misma anatomía.</p>

    <div class="toggle" role="group" aria-label="Elegir condición">
      <button id="btnEndo" type="button" aria-pressed="true">Endometriosis</button>
      <button id="btnAdeno" type="button" aria-pressed="false">Adenomiosis</button>
    </div>

    <div class="diagram">
      <div class="glow" id="glow"></div>
      <svg viewBox="0 0 400 380" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Diagrama de útero, trompas, ovarios, intestino y vejiga con focos de tejido">
        <!-- Intestino: asa enrollada detrás del útero -->
        <g>
          <path d="M96,74 L304,74 A18,18 0 0 1 304,110 L96,110 A18,18 0 0 0 96,146 L304,146 A18,18 0 0 1 304,182 L120,182" fill="none" stroke="var(--organS)" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"></path>
          <path d="M96,74 L304,74 A18,18 0 0 1 304,110 L96,110 A18,18 0 0 0 96,146 L304,146 A18,18 0 0 1 304,182 L120,182" fill="none" stroke="var(--organ)" stroke-width="21" stroke-linecap="round" stroke-linejoin="round"></path>
          <path d="M96,74 L304,74 A18,18 0 0 1 304,110 L96,110 A18,18 0 0 0 96,146 L304,146 A18,18 0 0 1 304,182 L120,182" fill="none" stroke="var(--organHi)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.55"></path>
        </g>
        <!-- Útero + trompas + ovarios -->
        <g class="breathe">
          <path d="M138,148 C112,120 86,118 66,134 C52,146 56,164 74,168" fill="none" stroke="var(--uStroke)" stroke-width="6" stroke-linecap="round"></path>
          <path d="M262,148 C288,120 314,118 334,134 C348,146 344,164 326,168" fill="none" stroke="var(--uStroke)" stroke-width="6" stroke-linecap="round"></path>
          <ellipse cx="62" cy="186" rx="23" ry="15" fill="var(--ovary)" stroke="var(--uStroke)" stroke-width="5"></ellipse>
          <ellipse cx="338" cy="186" rx="23" ry="15" fill="var(--ovary)" stroke="var(--uStroke)" stroke-width="5"></ellipse>
          <g class="uwrap" id="uwrap">
            <path d="M186,306 L214,306 L210,342 Q200,349 190,342 Z" fill="var(--uFill)" stroke="var(--uStroke)" stroke-width="5" stroke-linejoin="round"></path>
            <path id="uwall" class="uwall" d="M125,150 C125,118 158,102 200,102 C242,102 275,118 275,150 C282,205 252,260 222,295 C214,304 208,308 200,308 C192,308 186,304 178,295 C148,260 118,205 125,150 Z" fill="var(--uFill)" stroke="var(--uStroke)" stroke-width="6" stroke-linejoin="round"></path>
            <path d="M170,160 L230,160 L204,254 L200,259 L196,254 Z" fill="var(--cavity)"></path>
          </g>
        </g>
        <!-- Vejiga -->
        <g>
          <ellipse cx="200" cy="314" rx="58" ry="40" fill="var(--organ)" fill-opacity="0.5" stroke="var(--organS)" stroke-width="3" stroke-opacity="0.85"></ellipse>
        </g>
        <!-- Focos de ADENOMIOSIS (dentro de la pared) -->
        <g class="lgroup" id="adenoGroup" style="opacity:0;transform:scale(0.86);"></g>
        <!-- Focos de ENDOMETRIOSIS (fuera del útero) -->
        <g class="lgroup" id="endoGroup" style="opacity:1;transform:scale(1);"></g>
        <!-- Etiquetas -->
        <g>
          <circle cx="216" cy="60" r="2.6" fill="var(--leader)"></circle>
          <circle cx="95" cy="128" r="2.6" fill="var(--leader)"></circle>
          <circle cx="46" cy="190" r="2.6" fill="var(--leader)"></circle>
          <circle cx="266" cy="210" r="2.6" fill="var(--leader)"></circle>
          <circle cx="255" cy="320" r="2.6" fill="var(--leader)"></circle>
          <path d="M216,60 L216,38" fill="none" stroke="var(--leader)" stroke-width="1.5"></path>
          <path d="M95,128 L42,108" fill="none" stroke="var(--leader)" stroke-width="1.5"></path>
          <path d="M46,190 L16,206" fill="none" stroke="var(--leader)" stroke-width="1.5"></path>
          <path d="M266,210 L350,226" fill="none" stroke="var(--leader)" stroke-width="1.5"></path>
          <path d="M255,320 L352,302" fill="none" stroke="var(--leader)" stroke-width="1.5"></path>
          <text x="216" y="32" text-anchor="middle" fill="var(--labelInk)" style="font:700 14px var(--body);letter-spacing:1.5px;">INTESTINO</text>
          <text x="38" y="105" text-anchor="end" fill="var(--labelInk)" style="font:700 14px var(--body);letter-spacing:1.5px;">TROMPA</text>
          <text x="12" y="211" text-anchor="end" fill="var(--labelInk)" style="font:700 14px var(--body);letter-spacing:1.5px;">OVARIO</text>
          <text x="356" y="231" text-anchor="start" fill="var(--labelInk)" style="font:700 14px var(--body);letter-spacing:1.5px;">ÚTERO</text>
          <text x="358" y="307" text-anchor="start" fill="var(--labelInk)" style="font:700 14px var(--body);letter-spacing:1.5px;">VEJIGA</text>
        </g>
      </svg>
    </div>

    <div class="card" id="card">
      <span class="chip" id="chip">Tejido FUERA del útero</span>
      <h2 id="cardName">Endometriosis</h2>
      <p class="def" id="cardDef"></p>
      <div class="sectlabel"><span>Dónde</span><span class="rule"></span></div>
      <p class="ubic" id="cardUbic"></p>
      <div class="sectlabel" style="margin-top:34px;"><span>Síntomas frecuentes</span><span class="rule"></span></div>
      <div class="sint" id="cardSint"></div>
    </div>

    <div class="foot">
      <span class="disc">Contenido educativo · No sustituye la valoración médica</span>
      <span class="brand">REDEP CHILE</span>
    </div>
  </div>
</div>

<script>
(function(){
  var DATA = {
    endometriosis: {
      accent:'#9E3D5B', chipBg:'rgba(158,61,91,.12)', tagline:'Tejido FUERA del útero', name:'Endometriosis',
      def:'Tejido similar al endometrio crece fuera del útero, sobre los ovarios, las trompas, el intestino y la vejiga.',
      ubic:'Ovarios · Trompas · Intestino · Vejiga · Peritoneo',
      sint:['Dolor pélvico que empeora con la regla','Dolor en las relaciones sexuales','Fatiga intensa y persistente','Dificultad para concebir']
    },
    adenomiosis: {
      accent:'#B0712A', chipBg:'rgba(176,113,42,.12)', tagline:'Tejido DENTRO del músculo', name:'Adenomiosis',
      def:'Tejido endometrial crece dentro de la pared muscular del útero (miometrio) y la engrosa.',
      ubic:'Pared muscular del útero · Miometrio',
      sint:['Sangrado menstrual abundante','Cólicos muy intensos','Útero agrandado y sensible','Sensación de presión pélvica']
    }
  };

  var ENDO_LESIONS = [
    {cx:150,cy:74,r:10},{cx:238,cy:74,r:9},{cx:316,cy:92,r:10},{cx:84,cy:128,r:9},
    {cx:58,cy:181,r:12},{cx:77,cy:193,r:10},{cx:64,cy:202,r:8},
    {cx:342,cy:181,r:12},{cx:323,cy:193,r:10},{cx:336,cy:202,r:8},
    {cx:96,cy:152,r:8},{cx:304,cy:152,r:8},
    {cx:172,cy:318,r:9},{cx:228,cy:318,r:9}
  ];
  var ADENO_LESIONS = [
    {cx:160,cy:178,r:6},{cx:166,cy:208,r:5},{cx:156,cy:234,r:6},{cx:150,cy:198,r:5},
    {cx:240,cy:178,r:6},{cx:246,cy:210,r:5},{cx:252,cy:236,r:6},{cx:256,cy:202,r:5},
    {cx:244,cy:256,r:6},{cx:233,cy:264,r:5},{cx:251,cy:248,r:5},{cx:238,cy:244,r:5},
    {cx:186,cy:135,r:5},{cx:214,cy:135,r:5},{cx:200,cy:129,r:5}
  ];
  var SVGNS='http://www.w3.org/2000/svg';
  function circle(d, fill, edge){
    var c=document.createElementNS(SVGNS,'circle');
    c.setAttribute('class','lesion');
    c.setAttribute('cx',d.cx);c.setAttribute('cy',d.cy);c.setAttribute('r',d.r);
    c.style.fill=fill; if(edge){c.style.stroke=edge;c.style.strokeWidth='2.5';}
    return c;
  }
  var endoGroup=document.getElementById('endoGroup'), adenoGroup=document.getElementById('adenoGroup');
  ENDO_LESIONS.forEach(function(d){endoGroup.appendChild(circle(d,'#9E3D5B','#7E2E47'));});
  ADENO_LESIONS.forEach(function(d){adenoGroup.appendChild(circle(d,'#B0712A',null));});

  var btnEndo=document.getElementById('btnEndo'), btnAdeno=document.getElementById('btnAdeno');
  var stage=document.getElementById('stage'), card=document.getElementById('card');
  var chip=document.getElementById('chip'), cardName=document.getElementById('cardName');
  var cardDef=document.getElementById('cardDef'), cardUbic=document.getElementById('cardUbic');
  var cardSint=document.getElementById('cardSint'), glow=document.getElementById('glow');
  var uwrap=document.getElementById('uwrap'), uwall=document.getElementById('uwall');

  function render(key, animate){
    var d=DATA[key], isEndo=key==='endometriosis';
    stage.style.setProperty('--accent', d.accent);
    btnEndo.setAttribute('aria-pressed', isEndo);
    btnAdeno.setAttribute('aria-pressed', !isEndo);
    endoGroup.style.opacity=isEndo?1:0;  endoGroup.style.transform=isEndo?'scale(1)':'scale(0.86)';
    adenoGroup.style.opacity=isEndo?0:1; adenoGroup.style.transform=isEndo?'scale(0.86)':'scale(1)';
    uwrap.style.transform=isEndo?'scale(1)':'scale(1.07)';
    uwall.setAttribute('stroke-width', isEndo?6:11);
    glow.style.background='radial-gradient(circle,'+d.accent+'33 0%,'+d.accent+'00 68%)';
    chip.style.background=d.chipBg; chip.textContent=d.tagline;
    cardName.textContent=d.name; cardDef.textContent=d.def; cardUbic.textContent=d.ubic;
    cardSint.innerHTML='';
    d.sint.forEach(function(s){
      var row=document.createElement('div'); row.className='row';
      var dot=document.createElement('span'); dot.className='dot';
      var tx=document.createElement('span'); tx.textContent=s;
      row.appendChild(dot); row.appendChild(tx); cardSint.appendChild(row);
    });
    if(animate){ card.classList.remove('swap'); void card.offsetWidth; card.classList.add('swap'); }
  }
  btnEndo.addEventListener('click', function(){render('endometriosis', true);});
  btnAdeno.addEventListener('click', function(){render('adenomiosis', true);});
  var initialCondition=new URLSearchParams(window.location.search).get('condicion');
  render(initialCondition==='adenomiosis'?'adenomiosis':'endometriosis', false);

  // Escala el lienzo 1080×1920 al ancho real del contenedor
  var widget=document.querySelector('.endo-widget');
  function fit(){
    var contentWidth=Math.min(widget.clientWidth,500);
    var scale=contentWidth/1080;
    stage.style.left=((widget.clientWidth-contentWidth)/2)+'px';
    stage.style.transform='scale('+scale+')';
  }
  if(window.ResizeObserver){ new ResizeObserver(fit).observe(widget); } else { window.addEventListener('resize', fit); }
  fit();
})();
</script>
</body>
</html>
